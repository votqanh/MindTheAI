<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindTheAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 22px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .stat-card {
      background: #0f172a;
      padding: 16px;
      text-align: center;
    }

    .stat-card .icon {
      font-size: 20px;
      display: block;
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 20px;
      font-weight: 700;
      color: #38bdf8;
      display: block;
    }

    .stat-card .label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .open-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 14px 16px;
      padding: 12px;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }

    .open-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(14, 165, 233, 0.45);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 12px;
      color: #64748b;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      display: inline-block;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">💧</div>
    <div class="header-text">
      <h1>MindTheAI</h1>
      <p>Responsible AI usage</p>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="icon">💧</span>
      <span class="value" id="water-saved">0 mL</span>
      <span class="label">Water Saved</span>
    </div>
    <div class="stat-card">
      <span class="icon">🛡️</span>
      <span class="value" id="privacy-count">0</span>
      <span class="label">Data Protected</span>
    </div>
  </div>

  <button class="open-btn" id="open-dashboard">Open Dashboard →</button>

  <div class="status-row">
    <span><span class="status-dot"></span>Active on this site</span>
    <span id="site-name">—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
