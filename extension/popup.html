<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindTheAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #22d3ee 0%, #0891b2 100%);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 22px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .stat-card {
      background: #0f172a;
      padding: 16px;
      text-align: center;
    }

    .stat-card .icon {
      font-size: 20px;
      display: block;
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 20px;
      font-weight: 700;
      color: #22d3ee;
      display: block;
    }

    .stat-card .label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    .open-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 14px 16px;
      padding: 12px;
      background: linear-gradient(135deg, #22d3ee, #0891b2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(34, 211, 238, 0.3);
    }

    .open-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(34, 211, 238, 0.45);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 12px;
      color: #64748b;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      display: inline-block;
      margin-right: 5px;
    }

    /* Toggle switch styles */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255,255,255,0.02);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .toggle-label {
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255,255,255,0.1);
      transition: .2s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #22d3ee;
    }
    input:checked + .slider:before {
      transform: translateX(14px);
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" style="width:22px; height:22px;" alt="logo" />
    <div class="header-text">
      <h1>MindTheAI</h1>
      <p>Responsible AI usage</p>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="icon">💧</span>
      <span class="value" id="water-saved">0 mL</span>
      <span class="label">Water Saved</span>
    </div>
    <div class="stat-card">
      <span class="icon">🛡️</span>
      <span class="value" id="privacy-count">0</span>
      <span class="label">Data Protected</span>
    </div>
  </div>

  <div class="toggle-row">
    <div class="toggle-label">
      <span>🔗</span>
      <span>Auto-open Dashboard</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="auto-open-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <button class="open-btn" id="open-dashboard">Open Dashboard →</button>

  <div class="status-row">
    <span><span class="status-dot"></span>Active on this site</span>
    <span id="site-name">—</span>
  </div>

  <script src="format.js"></script>
  <script src="popup.js"></script>
</body>
</html>
